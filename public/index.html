<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Krucze Galery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="search" id="search" placeholder="Szukaj albumów…" autocomplete="off" />
    </div>
    <div class="toolbar-controls">
      <select id="sort" aria-label="Sortowanie">
        <option value="newest">Najnowsze</option>
        <option value="oldest">Najstarsze</option>
        <option value="alpha">A → Z</option>
      </select>
      <div class="count" id="count" aria-live="polite"></div>
    </div>
    <!-- Place your logo as public/logo.png -->
    <a href="https://www.kruki.org" class="logo-link" aria-label="Krucze Galery — strona główna">
      <picture>
        <source media="(max-width: 600px)" srcset="logo.png" />
        <img src="logo-desktop.png" alt="Krucze Galery" class="logo" onerror="this.style.display='none'" />
      </picture>
    </a>
  </header>

  <main>
    <div class="grid" id="grid" role="list"></div>
    <p class="empty" id="empty" hidden>Nie znaleziono albumów. Spróbuj innego wyszukiwania.</p>
  </main>

  <footer class="footer">
    <a href="https://www.kruki.org" target="_blank" rel="noopener noreferrer">kruki.org</a>
    <a href="https://github.com/BractwoWojownikowKruki/krucze-galery" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
      <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/>
      </svg>
    </a>
    <a href="https://www.cardiocanwait.com" target="_blank" rel="noopener noreferrer">© CardioCanWait</a>
  </footer>

  <script src="app.js"></script>
</body>
</html>
